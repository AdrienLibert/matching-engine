alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

server:
  persistentVolume:
    enabled: false
  service:
    type: ClusterIP

serverFiles:
  prometheus.yml:
    rule_files:
      - /etc/config/liquidity_rules.yml
    scrape_configs:
      - job_name: matching_engine
        metrics_path: /metrics
        static_configs:
          - targets:
              - matching-engine-matching-engine-metrics.matching-engine.svc.cluster.local:2112
  liquidity_rules.yml:
    groups:
      - name: orderbook-liquidity-recordings
        rules:
          - record: orderbook_engine:spread_bps:1m
            expr: avg_over_time(orderbook_engine_spread_bps[1m])
          - record: orderbook_engine:spread_bps:5m
            expr: avg_over_time(orderbook_engine_spread_bps[5m])

          - record: orderbook_engine:l1_depth:1m
            expr: avg_over_time(orderbook_engine_best_bid_quantity[1m]) + avg_over_time(orderbook_engine_best_ask_quantity[1m])
          - record: orderbook_engine:l1_depth:5m
            expr: avg_over_time(orderbook_engine_best_bid_quantity[5m]) + avg_over_time(orderbook_engine_best_ask_quantity[5m])

          - record: orderbook_engine:near_mid_depth_25bps:1m
            expr: avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="25"}[1m]) + avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="25"}[1m])
          - record: orderbook_engine:near_mid_depth_50bps:1m
            expr: avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="50"}[1m]) + avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="50"}[1m])
          - record: orderbook_engine:near_mid_depth_100bps:1m
            expr: avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="100"}[1m]) + avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="100"}[1m])

          - record: orderbook_engine:near_mid_depth_50bps:5m
            expr: avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="50"}[5m]) + avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="50"}[5m])

          - record: orderbook_engine:book_balance_ratio_50bps:1m
            expr: ((avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="50"}[1m]) + avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="50"}[1m]) - abs(avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="50"}[1m]) - avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="50"}[1m]))) / 2) / clamp_min((avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="50"}[1m]) + avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="50"}[1m]) + abs(avg_over_time(orderbook_engine_near_mid_depth_quantity{side="bid",band_bps="50"}[1m]) - avg_over_time(orderbook_engine_near_mid_depth_quantity{side="ask",band_bps="50"}[1m]))) / 2, 1)

          - record: orderbook_engine:fill_ratio:1m
            expr: rate(orderbook_engine_executed_quantity_total[1m]) / clamp_min(rate(orderbook_engine_submitted_quantity_total[1m]), 0.000001)
          - record: orderbook_engine:fill_ratio:5m
            expr: rate(orderbook_engine_executed_quantity_total[5m]) / clamp_min(rate(orderbook_engine_submitted_quantity_total[5m]), 0.000001)

          - record: orderbook_engine:ttff_p95_seconds:5m
            expr: histogram_quantile(0.95, sum(rate(orderbook_engine_time_to_first_fill_seconds_bucket[5m])) by (le))

          - record: orderbook_engine:continuity:5m
            expr: avg_over_time((orderbook_engine_two_sided_book * (orderbook_engine_mid_price_jump_abs <= bool 1))[5m:])

      - name: orderbook-liquidity-alerts
        rules:
          - alert: OrderbookLiquiditySpreadTooWide
            expr: orderbook_engine:spread_bps:5m > 50
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Orderbook spread is persistently wide"
              description: "5m average spread exceeds 50 bps for more than 5 minutes."

          - alert: OrderbookLiquidityL1DepthLow
            expr: orderbook_engine:l1_depth:5m < 20
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Orderbook L1 depth is persistently low"
              description: "5m average L1 depth is below 20 units for more than 5 minutes."

          - alert: OrderbookLiquidityNearMidDepthLow
            expr: orderbook_engine:near_mid_depth_50bps:5m < 200
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Orderbook near-mid depth is persistently low"
              description: "5m average near-mid depth (±50bps) is below 200 units for more than 5 minutes."

          - alert: OrderbookLiquidityContinuityLow
            expr: orderbook_engine:continuity:5m < 0.99
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Orderbook continuity is below target"
              description: "Continuity over the last 5 minutes is below 99%."