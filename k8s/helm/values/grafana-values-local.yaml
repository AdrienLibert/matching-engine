service:
  type: ClusterIP

persistence:
  enabled: false

adminUser: admin
adminPassword: admin

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    orderbook-live:
      json: |
        {
          "uid": "orderbook-live",
          "title": "Orderbook Live Metrics",
          "tags": ["orderbook", "matching-engine"],
          "timezone": "browser",
          "schemaVersion": 39,
          "version": 1,
          "refresh": "5s",
          "time": {
            "from": "now-15m",
            "to": "now"
          },
          "panels": [
            {
              "id": 1,
              "type": "timeseries",
              "title": "Mid Price",
              "gridPos": {
                "h": 8,
                "w": 24,
                "x": 0,
                "y": 0
              },
              "datasource": "Prometheus",
              "targets": [
                {
                  "refId": "A",
                  "expr": "orderbook_engine_mid_price",
                  "legendFormat": "mid price"
                }
              ]
            },
            {
              "id": 2,
              "type": "timeseries",
              "title": "Trade Activity (rate + executions/min)",
              "gridPos": {
                "h": 8,
                "w": 24,
                "x": 0,
                "y": 8
              },
              "datasource": "Prometheus",
              "targets": [
                {
                  "refId": "A",
                  "expr": "rate(orderbook_engine_executed_trades_total[1m])",
                  "legendFormat": "trade rate/s"
                },
                {
                  "refId": "B",
                  "expr": "increase(orderbook_engine_executed_trades_total[1m])",
                  "legendFormat": "executions/min"
                }
              ]
            },
            {
              "id": 3,
              "type": "timeseries",
              "title": "Top of Book (best bid / best ask / spread / open orders)",
              "gridPos": {
                "h": 8,
                "w": 24,
                "x": 0,
                "y": 16
              },
              "datasource": "Prometheus",
              "targets": [
                {
                  "refId": "A",
                  "expr": "orderbook_engine_best_bid",
                  "legendFormat": "best bid"
                },
                {
                  "refId": "B",
                  "expr": "orderbook_engine_best_ask",
                  "legendFormat": "best ask"
                },
                {
                  "refId": "C",
                  "expr": "orderbook_engine_spread",
                  "legendFormat": "spread"
                },
                {
                  "refId": "D",
                  "expr": "orderbook_engine_open_order_count",
                  "legendFormat": "open orders"
                }
              ]
            }
          ]
        }