namespace: matching-engine
replicaCount: 1

kafkaInit:
  image:
    repository: local/kafka-init
    tag: latest
  midPrice: "50.0"
  spread: "1.0"
  quantity: "100"

traderpool:
  image:
    repository: local/traderpool
    tag: latest
  numTraders: "600"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

matching-engine:
  image:
    repository: local/matching-engine
    tag: latest
  metrics:
    enabled: true
    port: 2112
    path: /metrics
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"